<!DOCTYPE html>
<!--
Expected fieldIndex layout (0-based querySelectorAll order):
  0  institution-1        -> education[0].institution
  1  degree-1             -> education[0].credential
  2  graduation-year-1    -> education[0].dates text matcher
  3  edu-spacer-1         -> hidden spacer, skipped by scanner
  4  edu-spacer-2         -> hidden spacer, skipped by scanner
  5  edu-spacer-3         -> hidden spacer, skipped by scanner
  6  edu-spacer-4         -> hidden spacer, skipped by scanner
  7  institution-2        -> education[1].institution after regrouping
  8  degree-2             -> education[1].credential after regrouping
  9  graduation-year-2    -> education[1].dates, graduation year select
 10  salary-expectations  -> skipped as sensitive
 11  cover-letter         -> unmatched

Gap from graduation-year-1 (2) to institution-2 (7) = 5 > EDUCATION_GAP_THRESHOLD (3).
Use a profile with two education entries to see both sections filled.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Autofill Multi-Education Test Form</title>
  <style>
    body { font-family: sans-serif; max-width: 680px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.3rem; }
    h2 { font-size: 1rem; margin-top: 32px; border-top: 2px solid #ccc; padding-top: 12px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-top: 12px; }
    input[type="text"], select, textarea {
      display: block; width: 100%; box-sizing: border-box; padding: 6px 8px;
      margin-top: 4px; border: 1px solid #aaa; border-radius: 4px; font-size: 0.9rem;
    }
    .note { font-size: 0.85rem; color: #555; line-height: 1.45; }
    .sensitive { background: #fff3cd; }
    button[type="submit"] {
      margin-top: 24px; padding: 10px 20px; background: #2563eb;
      color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem;
    }
  </style>
</head>
<body>

<h1>Autofill Multi-Education Test Form</h1>

<p class="note">
  Load this file in the browser. Open the extension dashboard. Use
  <strong>Scan Form Fields</strong>. Use a profile with two education entries
  to see both sections filled.
</p>

<form id="test-form" onsubmit="return false;">
  <h2>Education 1</h2>

  <label for="institution-1">Education 1 institution</label>
  <input type="text" id="institution-1" name="education_1_institution"
         placeholder="School, university, college, or institution" />

  <label for="degree-1">Education 1 degree or credential</label>
  <input type="text" id="degree-1" name="education_1_degree"
         placeholder="Degree, diploma, credential, major, or program name" />

  <label for="graduation-year-1">Education 1 graduation year or date</label>
  <input type="text" id="graduation-year-1" name="education_1_graduation_year"
         placeholder="Graduation date or education dates" />

  <input type="hidden" id="edu-spacer-1" name="edu_spacer_1" value="" />
  <input type="hidden" id="edu-spacer-2" name="edu_spacer_2" value="" />
  <input type="hidden" id="edu-spacer-3" name="edu_spacer_3" value="" />
  <input type="hidden" id="edu-spacer-4" name="edu_spacer_4" value="" />

  <h2>Education 2</h2>

  <label for="institution-2">Education 2 institution</label>
  <input type="text" id="institution-2" name="education_2_institution"
         placeholder="School, university, college, or institution" />

  <label for="degree-2">Education 2 degree or credential</label>
  <input type="text" id="degree-2" name="education_2_degree"
         placeholder="Degree, diploma, credential, major, or program name" />

  <label for="graduation-year-2">Education 2 graduation year</label>
  <select id="graduation-year-2" name="education_2_graduation_year">
    <option value="">Select graduation year</option>
    <option value="2015">2015</option>
    <option value="2016">2016</option>
    <option value="2017">2017</option>
    <option value="2018">2018</option>
    <option value="2019">2019</option>
    <option value="2020">2020</option>
    <option value="2021">2021</option>
    <option value="2022">2022</option>
    <option value="2023">2023</option>
    <option value="2024">2024</option>
    <option value="2025">2025</option>
  </select>

  <h2>Other Fields</h2>

  <label for="salary-expectations">Salary expectations</label>
  <input class="sensitive" type="text" id="salary-expectations" name="salary_expectations"
         placeholder="This sensitive field should be skipped" />

  <label for="cover-letter">Cover letter</label>
  <textarea id="cover-letter" name="cover_letter" rows="5"
            placeholder="Paste your cover letter here"></textarea>

  <button type="submit">Submit</button>
</form>

</body>
</html>
